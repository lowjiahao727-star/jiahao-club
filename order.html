<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>提交订单</title>
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="header">
    提交订单
</div>

<div class="container">

    <div class="card">
        <h3>商品信息</h3>

        <p><b>商品：</b>VIP会员</p>

        <p><b>价格：</b>RM 30.00</p>

        <p><b>订单号：</b><span id="orderNo"></span></p>
    </div>

    <div class="card">

        <h3>扫码付款</h3>

        <img src="images/qrcode.png" style="width:220px;display:block;margin:auto;">

        <p style="text-align:center;margin-top:10px;">
            请付款后上传截图
        </p>

    </div>

    <div class="card">

        <h3>上传付款截图</h3>

        <input type="file" id="paymentImage">

        <button class="btn" id="submitOrder">
            提交审核
        </button>

    </div>

</div>

<script type="module" src="js/order.js"></script>

</body>
</html>
