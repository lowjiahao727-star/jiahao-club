<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>管理员登录</title>

<link rel="stylesheet" href="../css/style.css">

</head>

<body>

<div class="container">

    <div class="header">
        管理后台
    </div>

    <div class="card">

        <h2 style="text-align:center;">管理员登录</h2>

        <input
            type="email"
            id="email"
            class="input"
            placeholder="管理员邮箱">

        <input
            type="password"
            id="password"
            class="input"
            placeholder="管理员密码">

        <button
            class="btn"
            id="loginBtn">
            登录后台
        </button>

    </div>

</div>

<script type="module" src="../js/admin.js"></script>

</body>
</html>
