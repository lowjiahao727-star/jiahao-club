<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户登录</title>

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="container">

    <div class="header">
        嘉豪俱乐部
    </div>

    <div class="card">

        <h2 style="text-align:center;">用户登录</h2>

        <input
            type="email"
            id="email"
            class="input"
            placeholder="请输入邮箱">

        <input
            type="password"
            id="password"
            class="input"
            placeholder="请输入密码">

        <button class="btn" id="loginBtn">
            登录
        </button>

        <p style="text-align:center;margin-top:20px;">
            没有账号？
            <a href="register.html" style="color:#ff9800;">
                立即注册
            </a>
        </p>

    </div>

</div>

<script type="module" src="js/login.js"></script>

</body>
</html>
